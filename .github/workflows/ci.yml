name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    steps:
      - uses: actions/checkout@v5

      - run: npm ci

      - run: npm run lint

      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    container:
      image: docker:28-cli
      options: --volume /var/run/docker.sock:/var/run/docker.sock
    steps:
      - uses: actions/checkout@v5

      - run: docker build .
