<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="ui-overlay">
      <div id="score-board">
        <span id="score-label">Score</span>
        <span id="score-value">0</span>
      </div>
      <div id="high-score-board">
        <span id="high-score-label">Best</span>
        <span id="high-score-value">0</span>
      </div>
    </div>

    <div id="game-over-overlay" class="overlay hidden">
      <h1>Game Over</h1>
      <p>Score: <span id="final-score">0</span></p>
      <p>Best: <span id="final-best">0</span></p>
      <div id="name-input-wrapper" class="hidden">
        <p>New high score! Enter your name:</p>
        <div class="name-input-row">
          <input type="text" id="name-input" maxlength="20" placeholder="Player" autocomplete="off" />
          <button id="save-score-btn">Save</button>
        </div>
      </div>
      <div id="leaderboard" class="hidden">
        <h2>Leaderboard</h2>
        <ol id="leaderboard-list"></ol>
      </div>
      <button id="restart-btn">Play Again</button>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <h1>Paused</h1>
      <p>Score: <span id="pause-score">0</span></p>
      <p>Best: <span id="pause-best">0</span></p>
      <div id="leaderboard-pause">
        <h2>Leaderboard</h2>
        <ol id="pause-leaderboard-list"></ol>
      </div>
      <p>Press <kbd>Esc</kbd> to resume</p>
    </div>

    <div id="start-overlay" class="overlay">
      <h1>Snake</h1>
      <div id="leaderboard-start">
        <h2>Leaderboard</h2>
        <ol id="start-leaderboard-list"></ol>
      </div>
      <p class="controls-hint">Arrow keys / WASD to move — <kbd>Esc</kbd> to pause</p>
      <button id="start-btn">Start Game</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
