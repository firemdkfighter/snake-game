<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    h1 {
      margin-bottom: 1rem;
      font-size: 2rem;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }

    #game-container {
      position: relative;
      border: 3px solid #0f3460;
      border-radius: 8px;
      overflow: hidden;
    }

    canvas {
      display: block;
      background: #0a0a15;
    }

    #score-board {
      margin-top: 1rem;
      font-size: 1.5rem;
    }

    #start-btn {
      margin-top: 1rem;
      padding: 12px 32px;
      font-size: 1.2rem;
      background: linear-gradient(90deg, #00b09b, #96c93d);
      border: none;
      border-radius: 25px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    #start-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
    }

    .controls-info {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #888;
    }

    .key {
      display: inline-block;
      padding: 4px 8px;
      background: #2a2a4a;
      border-radius: 4px;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <h1>🐍 Snake Game</h1>
  
  <div id="game-container">
    <canvas id="game" width="400" height="400"></canvas>
  </div>

  <div id="score-board">Score: <span id="score">0</span></div>
  <button id="start-btn">Start Game</button>
  
  <div class="controls-info">
    Use <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> or WASD to control
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const startBtn = document.getElementById('start-btn');

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake = [];
    let food = { x: 0, y: 0 };
    let direction = { x: 0, y: 0 };
    let gameRunning = false;
    let score = 0;
    let gameLoop = null;
    let speed = 100;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      score = 0;
      speed = 100;
      scoreElement.textContent = score;
      placeFood();
      gameRunning = true;
      startBtn.style.display = 'none';
      gameLoop();
    }

    function placeFood() {
      let foodPlaced = false;
      while (!foodPlaced) {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
        foodPlaced = true;
        for (let segment of snake) {
          if (segment.x === food.x && segment.y === food.y) {
            foodPlaced = false;
            break;
          }
        }
      }
    }

    function gameLoop() {
      if (!gameRunning) return;

      update();
      draw();

      if (gameRunning) {
        setTimeout(gameLoop, speed);
      }
    }

    function update() {
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      // Check wall collision
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
        gameOver();
        return;
      }

      // Check self collision
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          gameOver();
          return;
        }
      }

      snake.unshift(head);

      // Check food collision
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.textContent = score;
        placeFood();

        // Increase speed every 50 points
        if (score % 50 === 0) {
          speed = Math.max(50, speed - 10);
        }
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.fillStyle = '#0a0a15';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw food
      ctx.fillStyle = '#ff6b6b';
      ctx.shadowColor = '#ff6b6b';
      ctx.shadowBlur = 10;
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
      ctx.shadowBlur = 0;

      // Draw snake
      snake.forEach((segment, index) => {
        ctx.fillStyle = index === 0 ? '#00ff88' : '#00cc6a';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = index === 0 ? 10 : 0;
        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
        ctx.shadowBlur = 0;
      });
    }

    function gameOver() {
      gameRunning = false;
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'white';
      ctx.font = 'bold 48px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over!', canvas.width / 2, canvas.height / 2);

      ctx.font = '24px Segoe UI';
      ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 40);

      startBtn.textContent = 'Play Again';
      startBtn.style.display = 'block';
    }

    function handleInput(e) {
      switch (e.key.toLowerCase()) {
        case 'arrowup':
        case 'w':
          if (direction.y === 0) direction = { x: 0, y: -1 };
          break;
        case 'arrowdown':
        case 's':
          if (direction.y === 0) direction = { x: 0, y: 1 };
          break;
        case 'arrowleft':
        case 'a':
          if (direction.x === 0) direction = { x: -1, y: 0 };
          break;
        case 'arrowright':
        case 'd':
          if (direction.x === 0) direction = { x: 1, y: 0 };
          break;
      }
    }

    document.addEventListener('keydown', handleInput);
    startBtn.addEventListener('click', initGame);

    // Prevent default key behaviors
    document.addEventListener('keydown', (e) => {
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
