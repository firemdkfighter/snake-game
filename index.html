<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <div id="ui-overlay">
      <div id="score-board">
        <span id="score-label">Score</span>
        <span id="score-value">0</span>
      </div>
      <div id="high-score-board">
        <span id="high-score-label">Best</span>
        <span id="high-score-value">0</span>
      </div>
    </div>

    <div id="overlay" class="overlay">
      <h1 id="overlay-title">Snake</h1>
      <p id="overlay-score-row" class="hidden">Score: <span id="overlay-score">0</span> &middot; Best: <span id="overlay-best">0</span></p>
      <div id="name-input-wrapper" class="hidden">
        <p>New high score! Enter your name:</p>
        <div class="name-input-row">
          <input type="text" id="name-input" maxlength="20" placeholder="Player" autocomplete="off" />
          <button id="save-score-btn">Save</button>
        </div>
      </div>
      <div class="lb-section">
        <h2>Leaderboard</h2>
        <ol id="overlay-leaderboard-list"></ol>
      </div>
      <p id="overlay-hint" class="controls-hint">Arrow keys / WASD to move &mdash; <kbd>Esc</kbd> to pause</p>
      <button id="overlay-action-btn">Start Game</button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
